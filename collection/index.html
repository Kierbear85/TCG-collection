<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nug.monster — card collection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
  <style>
    /* Collection-specific styles */

    .controls {
      padding: 1.25rem 2rem;
      display: flex;
      gap: 1.5rem;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(10, 10, 15, 0.92);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .count-badge {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .count-badge strong {
      color: var(--accent);
      font-weight: 400;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .control-label {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .pill-group {
      display: flex;
      gap: 0.25rem;
    }

    .pill {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.3rem 0.65rem;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .pill:hover {
      border-color: var(--muted);
      color: var(--text);
    }

    .pill.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    .set-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.05em;
      padding: 0.3rem 0.65rem;
      cursor: pointer;
      outline: none;
      max-width: 200px;
      transition: border-color 0.15s;
    }

    .set-select:focus,
    .set-select:hover {
      border-color: var(--accent);
    }

    .set-select option {
      background: var(--surface);
    }

    .legend {
      display: flex;
      gap: 1.25rem;
      align-items: center;
      flex-wrap: wrap;
      padding: 0.75rem 2rem;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .legend-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    main {
      padding: 0 0 4rem;
    }

    .set-group {
      border-bottom: 1px solid var(--border);
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.4s ease forwards;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .set-header {
      padding: 1.5rem 2rem 1rem;
      display: flex;
      align-items: baseline;
      gap: 1rem;
      cursor: pointer;
      user-select: none;
    }

    .set-header:hover .set-name {
      color: var(--accent);
    }

    .set-name {
      font-family: 'Unbounded', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      transition: color 0.15s;
    }

    .set-count {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .set-toggle {
      margin-left: auto;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      transition: color 0.15s;
    }

    .set-header:hover .set-toggle {
      color: var(--accent);
    }

    .set-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 1.25rem;
      padding: 0 2rem 1.5rem;
      overflow: hidden;
      transition: max-height 0.35s ease, opacity 0.25s ease, padding 0.25s ease;
    }

    .set-cards.collapsed {
      max-height: 0 !important;
      opacity: 0;
      padding-bottom: 0;
    }

    .card {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp 0.3s ease forwards;
    }

    .card-img-wrap {
      position: relative;
      border-radius: 6px;
      overflow: hidden;
      background: var(--surface);
      aspect-ratio: 2.5 / 3.5;
      border: 1px solid var(--border);
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }

    .card:hover .card-img-wrap {
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--card-glow), 0 8px 24px rgba(0, 0, 0, 0.5);
      transform: translateY(-3px) rotate(-0.4deg);
    }

    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .no-image {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .card-count {
      position: absolute;
      bottom: 7px;
      left: 7px;
      background: rgba(10, 10, 15, 0.85);
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 0.52rem;
      letter-spacing: 0.06em;
      padding: 0.1rem 0.32rem;
    }

    .status-dot {
      position: absolute;
      top: 7px;
      right: 7px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, 0.5);
    }

    .status-dot.owned {
      background: var(--accent);
    }

    .status-dot.for-trade {
      background: var(--accent2);
    }

    .status-dot.wanted {
      background: #f05080;
    }

    .status-dot.sold {
      background: var(--muted);
    }

    .card-meta {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .card-name {
      font-family: 'Unbounded', sans-serif;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-tags {
      display: flex;
      gap: 0.25rem;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 0.52rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 0.12rem 0.35rem;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .tag.owned {
      border-color: var(--accent);
      color: var(--accent);
    }

    .tag.for-trade {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    .tag.wanted {
      border-color: #f05080;
      color: #f05080;
    }

    .state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6rem 2rem;
      gap: 1rem;
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-align: center;
    }

    .spinner {
      width: 22px;
      height: 22px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    footer {
      padding: 2rem;
      border-top: 1px solid var(--border);
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.88);
      backdrop-filter: blur(10px);
      z-index: 500;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      max-width: 620px;
      width: 100%;
      max-height: 92vh;
      overflow-y: auto;
      position: relative;
      animation: fadeUp 0.18s ease;
    }

    .modal-close {
      position: absolute;
      top: 0.9rem;
      right: 1rem;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.9rem;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      z-index: 1;
      transition: color 0.15s;
      padding: 0.2rem;
    }

    .modal-close:hover {
      color: var(--text);
    }

    .modal-body {
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 1.5rem;
      padding: 1.5rem;
    }

    .modal-img img {
      width: 100%;
      border-radius: 6px;
      border: 1px solid var(--border);
      display: block;
    }

    .modal-info {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      min-width: 0;
    }

    .modal-name {
      font-family: 'Unbounded', sans-serif;
      font-size: 1rem;
      font-weight: 900;
      line-height: 1.15;
    }

    .modal-meta {
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .rarity-badge {
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.15rem 0.45rem;
      border: 1px solid;
      display: inline-block;
      align-self: flex-start;
    }

    .modal-section-title {
      font-size: 0.56rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.35rem;
      margin-bottom: 0.4rem;
    }

    .modal-prices {
      padding: 0 1.5rem 1.5rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      border-top: 1px solid var(--border);
    }

    .price-block {
      padding-top: 1rem;
    }

    .price-market {
      font-family: 'Unbounded', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }

    .price-market small {
      font-family: 'DM Mono', monospace;
      font-size: 0.55rem;
      color: var(--muted);
      font-weight: 400;
    }

    .price-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.6rem;
      letter-spacing: 0.04em;
      padding: 0.18rem 0;
    }

    .price-row .lbl {
      color: var(--muted);
    }

    .price-row .val {
      color: var(--text);
    }

    .price-variant {
      font-size: 0.56rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0.6rem 0 0.25rem;
    }

    .attacks-list {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .attack-item {
      font-size: 0.62rem;
    }

    .attack-header {
      display: flex;
      justify-content: space-between;
      color: var(--text);
    }

    .attack-dmg {
      color: var(--accent);
      font-weight: bold;
    }

    .attack-text {
      color: var(--muted);
      margin-top: 0.15rem;
      line-height: 1.55;
    }

    .modal-state {
      padding: 3.5rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      color: var(--muted);
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-align: center;
    }

    .modal-key-prompt {
      max-width: 320px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
    }

    .key-input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      padding: 0.5rem 0.75rem;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }

    .key-input:focus {
      border-color: var(--accent);
    }

    .key-submit {
      background: none;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.4rem 1.25rem;
      cursor: pointer;
      transition: all 0.15s;
      width: 100%;
    }

    .key-submit:hover {
      background: var(--accent);
      color: var(--bg);
    }

    .tcg-link {
      padding: 0 1.5rem 1.25rem;
      text-align: right;
    }

    .tcg-link a {
      font-size: 0.58rem;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-decoration: none;
    }

    .tcg-link a:hover {
      text-decoration: underline;
    }

    @media (max-width: 520px) {
      .modal-body {
        grid-template-columns: 1fr;
      }

      .modal-img {
        max-width: 160px;
      }

      .modal-prices {
        grid-template-columns: 1fr;
        gap: 0;
      }
    }

    @media (max-width: 520px) {
      h1 {
        font-size: 2rem;
      }

      .controls {
        gap: 0.75rem;
        padding: 1rem;
      }

      .set-header {
        padding: 1.25rem 1rem 0.75rem;
      }

      .set-cards {
        grid-template-columns: repeat(2, 1fr);
        gap: 0.85rem;
        padding: 0 1rem 1.25rem;
      }
    }
  </style>
</head>

<body>

  <header>
    <a href="../index.html" class="site-label">nug.monster / collection</a>
    <h1>card<br><span>archive</span></h1>
    <p class="subtitle">pokémon tcg · stored on at protocol · fetched live</p>
  </header>

  <div class="controls">
    <span class="count-badge" id="count-badge">fetching...</span>

    <div class="control-group">
      <span class="control-label">set</span>
      <select class="set-select" id="set-filter">
        <option value="all">all sets</option>
      </select>
    </div>

    <div class="control-group">
      <span class="control-label">sort</span>
      <div class="pill-group">
        <button class="pill active" data-sort="newest">newest</button>
        <button class="pill" data-sort="az">a–z</button>
        <button class="pill" data-sort="set#">set #</button>
        <button class="pill" data-sort="rarity">rarity</button>
      </div>
    </div>
  </div>

  <div class="legend">
    <span class="legend-item"><span class="legend-dot" style="background:#c8f050"></span>owned</span>
    <span class="legend-item"><span class="legend-dot" style="background:#50f0c8"></span>for trade</span>
    <span class="legend-item"><span class="legend-dot" style="background:#f05080"></span>wanted</span>
    <span class="legend-item"><span class="legend-dot" style="background:#5a5a7a"></span>sold</span>
  </div>

  <main id="main">
    <div class="state">
      <div class="spinner"></div>
      <span>fetching collection from at protocol...</span>
    </div>
  </main>

  <footer>
    <span>nug.monster · <a href="https://bsky.app/profile/nug.monster" target="_blank">@nug.monster on
        bluesky</a></span>
    <span>data via <a href="https://tcgdex.dev" target="_blank">tcgdex</a> · stored on <a href="https://atproto.com"
        target="_blank">at protocol</a></span>
  </footer>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modal-close">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script>
    const HANDLE = 'nug.monster'
    const COLLECTION = 'com.kieran.tcg.cardInstance'
    const API_BASE = `https://bsky.social/xrpc/com.atproto.repo.listRecords?repo=${HANDLE}&collection=${COLLECTION}&limit=100`

    const RARITY_RANK = {
      'hyper rare': 0,
      'rare shiny gx': 1,
      'special illustration rare': 1,
      'rare rainbow': 2,
      'ultra rare': 3,
      'rare ultra': 3,
      'rare secret': 3,
      'secret rare': 3,
      'illustration rare': 3,
      'ace spec rare': 4,
      'amazing rare': 4,
      'trainer gallery rare holo': 4,
      'rare shiny': 4,
      'double rare': 5,
      'rare holo vstar': 5,
      'rare holo vmax': 6,
      'rare holo mega': 7,
      'rare holo v': 7,
      'rare holo gx': 7,
      'rare holo ex': 7,
      'rare holo break': 8,
      'rare break': 8,
      'rare prism star': 8,
      'legend': 8,
      'rare holo': 9,
      'rare': 10,
      'promo': 10,
      'uncommon': 11,
      'common': 12,
    }

    const rarityCache = {}  // cardId → rarity string (empty string = fetched but none)

    async function ensureRarities() {
      const uniqueIds = [...new Set(allCards.map(c => c.id).filter(Boolean))]
        .filter(id => !(id in rarityCache))
      if (!uniqueIds.length) return
      await Promise.all(uniqueIds.map(async id => {
        try {
          const res = await fetch(`https://api.tcgdex.net/v2/en/cards/${id}`)
          rarityCache[id] = res.ok ? ((await res.json()).rarity || '') : ''
        } catch (e) {
          rarityCache[id] = ''
        }
      }))
    }

    function getRarityRank(card) {
      const r = (rarityCache[card.id] || '').toLowerCase().trim()
      if (!r) return 99

      // Exact match
      if (r in RARITY_RANK) return RARITY_RANK[r]

      // Japanese abbreviated codes (SV era: HR > SAR > UR > SR/AR > RR > R > U > C)
      if (r === 'hr') return 0
      if (r === 'sar') return 1
      if (r === 'sir') return 1
      if (r === 'ur') return 3
      if (r === 'sr') return 3
      if (r === 'ar') return 3
      if (r === 'chr') return 4
      if (r === 'csr') return 4
      if (r === 'rr') return 5
      if (r === 'r') return 10
      if (r === 'u') return 11
      if (r === 'c') return 12
      if (r === 'pr') return 10

      // Fuzzy English fallback
      if (r.includes('hyper')) return 0
      if (r.includes('special') && r.includes('illus')) return 1
      if (r.includes('rainbow')) return 2
      if (r.includes('ultra') || r.includes('secret')) return 3
      if (r.includes('illus') || r.includes('art rare')) return 3
      if (r.includes('ace spec')) return 4
      if (r.includes('amazing')) return 4
      if (r.includes('double')) return 5
      if (r.includes('vstar')) return 5
      if (r.includes('vmax')) return 6
      if (r.includes('holo')) return 9
      if (r.includes('uncommon')) return 11
      if (r.includes('common')) return 12
      if (r.includes('rare')) return 10

      return 99
    }

    function getCardNumber(card) {
      const last = (card.id || '').split('-').pop()
      const n = parseInt(last, 10)
      return isNaN(n) ? Infinity : n
    }

    let allCards = []
    let currentSort = 'newest'
    let currentSetFilter = 'all'
    let collapsedSets = new Set()

    async function fetchCollection() {
      try {
        let cursor = null
        let records = []

        do {
          const url = cursor ? `${API_BASE}&cursor=${cursor}` : API_BASE
          const res = await fetch(url)
          if (!res.ok) throw new Error(`HTTP ${res.status}`)
          const data = await res.json()
          records = records.concat(data.records)
          cursor = data.cursor
        } while (cursor)

        // _index preserves insertion order; higher = more recently added
        allCards = records.map((r, i) => ({ ...r.value, _index: i }))

        if (!allCards.length) {
          document.getElementById('main').innerHTML = `<div class="state"><span>no cards in collection yet</span></div>`
          document.getElementById('count-badge').textContent = 'empty collection'
          return
        }

        populateSetFilter()
        render()

      } catch (err) {
        document.getElementById('main').innerHTML = `
        <div class="state" style="color:#f05080">
          <span>failed to load collection</span>
          <span style="color:var(--muted);font-size:0.65rem">${err.message}</span>
        </div>`
      }
    }

    function populateSetFilter() {
      const sets = [...new Set(allCards.map(c => c.set).filter(Boolean))].sort()
      const sel = document.getElementById('set-filter')
      sets.forEach(s => {
        const opt = document.createElement('option')
        opt.value = s
        opt.textContent = s
        sel.appendChild(opt)
      })
    }

    function getSorted(cards) {
      if (currentSort === 'az') {
        return [...cards].sort((a, b) => a.name.localeCompare(b.name))
      }
      if (currentSort === 'set#') {
        return [...cards].sort((a, b) => getCardNumber(a) - getCardNumber(b))
      }
      if (currentSort === 'rarity') {
        return [...cards].sort((a, b) => getRarityRank(a) - getRarityRank(b))
      }
      return [...cards].sort((a, b) => b._index - a._index)
    }

    function deduplicateCards(cards) {
      const counts = new Map()
      const reps = new Map()
      for (const card of cards) {
        const key = card.id || card.name
        counts.set(key, (counts.get(key) || 0) + 1)
        if (!reps.has(key) || card._index > reps.get(key)._index) reps.set(key, card)
      }
      return [...reps.values()].map(c => ({ ...c, _count: counts.get(c.id || c.name) }))
    }

    function groupBySet(cards) {
      const map = new Map()
      cards.forEach(card => {
        const key = card.set || 'Unknown Set'
        if (!map.has(key)) map.set(key, [])
        map.get(key).push(card)
      })

      let entries = [...map.entries()].map(([k, v]) => [k, deduplicateCards(v)])

      if (currentSort === 'az' || currentSort === 'set#') {
        entries.sort(([a], [b]) => a.localeCompare(b))
      } else if (currentSort === 'rarity') {
        entries.sort(([, a], [, b]) =>
          Math.min(...a.map(getRarityRank)) - Math.min(...b.map(getRarityRank))
        )
      } else {
        // newest: group ordered by most recently added card
        entries.sort(([, a], [, b]) =>
          Math.max(...b.map(c => c._index)) - Math.max(...a.map(c => c._index))
        )
      }

      return entries
    }

    function render() {
      const filtered = currentSetFilter === 'all'
        ? allCards
        : allCards.filter(c => c.set === currentSetFilter)

      const badge = document.getElementById('count-badge')
      badge.innerHTML = `<strong>${filtered.length}</strong> card${filtered.length !== 1 ? 's' : ''}${currentSetFilter !== 'all' ? ` · <strong>${currentSetFilter}</strong>` : ''}`

      if (!filtered.length) {
        document.getElementById('main').innerHTML = `<div class="state"><span>no cards match current filter</span></div>`
        return
      }

      const sorted = getSorted(filtered)
      const groups = groupBySet(sorted)
      const main = document.getElementById('main')
      main.innerHTML = ''

      groups.forEach(([setName, cards], gi) => {
        const isCollapsed = collapsedSets.has(setName)

        const group = document.createElement('div')
        group.className = 'set-group'
        group.style.animationDelay = `${gi * 50}ms`
        group.dataset.setName = setName

        // rough max-height for animation: card ~240px tall + gap, N columns ~5
        const approxHeight = Math.ceil(cards.length / 5) * 280 + 80

        group.innerHTML = `
        <div class="set-header">
          <span class="set-name">${setName}</span>
          <span class="set-count">${cards.length} card${cards.length !== 1 ? 's' : ''}</span>
          <span class="set-toggle">${isCollapsed ? '▸ expand' : '▾ collapse'}</span>
        </div>
        <div class="set-cards ${isCollapsed ? 'collapsed' : ''}" style="max-height:${isCollapsed ? '0' : approxHeight + 'px'}">
          ${cards.map((card, i) => cardHTML(card, i)).join('')}
        </div>
      `

        group.querySelector('.set-header').addEventListener('click', () => {
          const cardsEl = group.querySelector('.set-cards')
          const toggle = group.querySelector('.set-toggle')
          if (collapsedSets.has(setName)) {
            collapsedSets.delete(setName)
            cardsEl.classList.remove('collapsed')
            cardsEl.style.maxHeight = approxHeight + 'px'
            toggle.textContent = '▾ collapse'
          } else {
            collapsedSets.add(setName)
            cardsEl.classList.add('collapsed')
            cardsEl.style.maxHeight = '0'
            toggle.textContent = '▸ expand'
          }
        })

        main.appendChild(group)
      })
    }

    function cardHTML(card, i) {
      const status = card.status || 'owned'
      const condition = card.condition || ''
      const delay = Math.min(i * 25, 500)
      const hasImg = !!card.image

      return `
      <div class="card" data-card-idx="${card._index}" style="animation-delay:${delay}ms;cursor:pointer">
        <div class="card-img-wrap">
          ${hasImg ? `<img src="${card.image}" alt="${card.name}" loading="lazy" onerror="this.style.display='none';this.parentElement.querySelector('.no-image').style.display='flex'">` : ''}
          <div class="no-image" style="display:${hasImg ? 'none' : 'flex'}">no image</div>
          <div class="status-dot ${status}"></div>
          ${card._count > 1 ? `<div class="card-count">×${card._count}</div>` : ''}
        </div>
        <div class="card-meta">
          <div class="card-name" title="${card.name}">${card.name}</div>
          <div class="card-tags">
            <span class="tag ${status}">${status}</span>
            ${condition ? `<span class="tag">${condition}</span>` : ''}
          </div>
        </div>
      </div>
    `
    }

    document.getElementById('set-filter').addEventListener('change', e => {
      currentSetFilter = e.target.value
      render()
    })

    document.querySelectorAll('.pill[data-sort]').forEach(btn => {
      btn.addEventListener('click', async () => {
        document.querySelectorAll('.pill[data-sort]').forEach(b => b.classList.remove('active'))
        btn.classList.add('active')
        currentSort = btn.dataset.sort
        if (currentSort === 'rarity') {
          btn.textContent = 'loading...'
          await ensureRarities()
          btn.textContent = 'rarity'
        }
        render()
      })
    })

    // ── Modal ──────────────────────────────────────────────────────────────

    const modalOverlay = document.getElementById('modal-overlay')
    const modalClose = document.getElementById('modal-close')
    const modalContent = document.getElementById('modal-content')
    const PW_API_KEY = 'pk_test_1b978aafde6eee1b9093b59bbb57c04d49c86583c9afa23f'

    let modalCurrency = 'USD'
    let rates = null
    let lastCard = null
    let lastPwData = null
    let lastCardType = null

    const CARD_TYPE_COLORS = {
      fire: '#e8623a',
      water: '#5b8fe8',
      grass: '#5db85d',
      electric: '#e8c43a',
      lightning: '#e8c43a',
      psychic: '#e8557a',
      fighting: '#b84040',
      darkness: '#7a6060',
      dark: '#7a6060',
      metal: '#a0a8c0',
      steel: '#a0a8c0',
      dragon: '#7040e8',
      fairy: '#e890b8',
      ice: '#80d0d0',
      ghost: '#8060a8',
      poison: '#a040b0',
      bug: '#90a830',
      rock: '#b0903a',
      ground: '#d0b060',
      flying: '#a090e8',
      normal: '#a0a080',
      colorless: '#a0a080',
    }

    function typeColor(type) {
      return CARD_TYPE_COLORS[(type || '').toLowerCase()] || null
    }

    function hexToRgb(hex) {
      return `${parseInt(hex.slice(1, 3), 16)},${parseInt(hex.slice(3, 5), 16)},${parseInt(hex.slice(5, 7), 16)}`
    }

    function applyTypeColor(color) {
      const modal = document.getElementById('modal')
      const overlay = document.getElementById('modal-overlay')
      if (color) {
        const rgb = hexToRgb(color)
        overlay.style.background = `linear-gradient(rgba(${rgb},0.08),rgba(${rgb},0.08)),rgba(0,0,0,0.88)`
        modal.style.borderColor = color
        modal.style.background = `${color}0f`
      } else {
        overlay.style.background = ''
        modal.style.borderColor = ''
        modal.style.background = ''
      }
    }

    async function fetchRates() {
      if (rates) return
      try {
        const res = await fetch('https://open.er-api.com/v6/latest/USD')
        const data = await res.json()
        rates = { EUR_to_USD: 1 / data.rates.EUR, USD_to_NZD: data.rates.NZD }
      } catch {
        rates = { EUR_to_USD: 1.08, USD_to_NZD: 1.65 }
      }
    }

    function toDisplay(amount, sourceCurrency) {
      if (amount == null) return null
      const usd = sourceCurrency === 'EUR' ? amount * (rates?.EUR_to_USD ?? 1.08) : amount
      return modalCurrency === 'NZD' ? usd * (rates?.USD_to_NZD ?? 1.65) : usd
    }

    function currSym() { return modalCurrency === 'NZD' ? 'NZ$' : '$' }

    function closeModal() {
      modalOverlay.classList.remove('open')
      modalContent.innerHTML = ''
      applyTypeColor(null)
    }

    modalClose.addEventListener('click', closeModal)
    modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal() })
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal() })

    function rarityColor(rarity) {
      const r = (rarity || '').toLowerCase()
      if (r.includes('hyper') || r.includes('special illustration')) return '#ffaa00'
      if (r.includes('illustration') || r.includes('ultra')) return '#c878ff'
      if (r.includes('secret') || r.includes('amazing')) return '#ff5080'
      if (r.includes('holo') || r.includes('rainbow')) return 'var(--accent2)'
      if (r.includes('rare')) return 'var(--accent)'
      return 'var(--muted)'
    }

    function renderPriceBlock(label, prices, sourceCurrency, fields) {
      const sym = currSym()
      if (!prices?.length) return `<div class="price-block"><div class="modal-section-title">${label}</div><span style="font-size:0.6rem;color:var(--muted)">no data</span></div>`

      return prices.map((p, i) => {
        const cv = v => toDisplay(v, sourceCurrency)
        return `
        <div class="price-block">
          ${i === 0 ? `<div class="modal-section-title">${label}</div>` : ''}
          ${p.sub_type_name || p.variant_type ? `<div class="price-variant">${p.sub_type_name || p.variant_type}</div>` : ''}
          ${fields.main && cv(p[fields.main]) != null ? `<div class="price-market">${sym}${cv(p[fields.main]).toFixed(2)} <small>${fields.mainLabel}</small></div>` : ''}
          ${fields.rows.filter(([k]) => cv(p[k]) != null).map(([k, lbl]) =>
          `<div class="price-row"><span class="lbl">${lbl}</span><span class="val">${sym}${cv(p[k]).toFixed(2)}</span></div>`
        ).join('')}
        </div>`
      }).join('')
    }

    function renderCardDetails(card, pw, cardType) {
      lastCard = card
      lastPwData = pw
      if (cardType !== undefined) lastCardType = cardType
      applyTypeColor(typeColor(lastCardType))

      const info = pw.card_info || {}
      const tcg = pw.tcgplayer
      const cm = pw.cardmarket
      const rc = rarityColor(info.rarity)
      const attacks = info.attacks || []

      modalContent.innerHTML = `
        <div class="modal-body">
          <div class="modal-img">
            ${card.image ? `<img src="${card.image}" alt="${card.name}" onerror="this.style.display='none'">` : ''}
          </div>
          <div class="modal-info">
            <div class="modal-name">${info.name || card.name}</div>
            <div class="modal-meta">
              <span>${info.set_name || card.set}${info.card_number ? ` · #${info.card_number}` : ''}</span>
              ${info.HP ? `<span>${info.HP} HP</span>` : ''}
            </div>
            ${info.rarity ? `<span class="rarity-badge" style="color:${rc};border-color:${rc}">${info.rarity}</span>` : ''}
            <div>
              <div class="modal-section-title">collection${card._count > 1 ? ` · ${card._count} copies` : ''}</div>
              <div style="display:flex;flex-direction:column;gap:0.3rem">
                ${(card._instances || [card]).map(inst => `
                  <div style="font-size:0.62rem;color:var(--muted);display:flex;gap:1rem">
                    <span>condition <span style="color:var(--text)">${inst.condition || '—'}</span></span>
                    <span>status <span style="color:var(--text)">${inst.status || '—'}</span></span>
                  </div>`).join('')}
              </div>
            </div>
            ${attacks.length ? `
            <div>
              <div class="modal-section-title">attacks</div>
              <div class="attacks-list">
                ${attacks.map(a => `
                  <div class="attack-item">
                    <div class="attack-header">
                      <span>${a.name || ''}</span>
                      ${a.damage ? `<span class="attack-dmg">${a.damage}</span>` : ''}
                    </div>
                    ${a.text ? `<div class="attack-text">${a.text}</div>` : ''}
                  </div>`).join('')}
              </div>
            </div>` : ''}
          </div>
        </div>
        <div style="padding:0.75rem 1.5rem 0;display:flex;align-items:center;gap:0.75rem;border-top:1px solid var(--border)">
          <span style="font-size:0.56rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted)">currency</span>
          <div class="pill-group">
            <button class="pill ${modalCurrency === 'USD' ? 'active' : ''}" onclick="setModalCurrency('USD')">USD</button>
            <button class="pill ${modalCurrency === 'NZD' ? 'active' : ''}" onclick="setModalCurrency('NZD')">NZD</button>
          </div>
        </div>
        <div class="modal-prices">
          ${renderPriceBlock('tcgplayer', tcg?.prices, 'USD', {
        main: 'market', mainLabel: 'market',
        rows: [['low', 'low'], ['mid', 'mid'], ['high', 'high']]
      })}
          ${renderPriceBlock('cardmarket', cm?.prices, 'EUR', {
        main: 'avg7', mainLabel: '7-day avg',
        rows: [['trend', 'trend'], ['avg30', '30d avg'], ['low', 'low']]
      })}
        </div>
        ${tcg?.url ? `<div class="tcg-link"><a href="${tcg.url}" target="_blank">view on tcgplayer →</a></div>` : ''}
      `
    }

    function setModalCurrency(c) {
      modalCurrency = c
      if (lastCard && lastPwData) renderCardDetails(lastCard, lastPwData)
    }

    async function loadCardData(card) {
      modalContent.innerHTML = `<div class="modal-state"><div class="spinner"></div><span>fetching card data...</span></div>`

      await fetchRates()

      try {
        const [pwRes, tcgRes] = await Promise.allSettled([
          fetch(`https://api.pokewallet.io/search?q=${encodeURIComponent(card.name)}&limit=50`,
            { headers: { 'X-API-Key': PW_API_KEY } }),
          fetch(`https://api.tcgdex.net/v2/en/cards/${card.id}`)
        ])

        let cardType = null
        if (tcgRes.status === 'fulfilled' && tcgRes.value.ok) {
          const tcgData = await tcgRes.value.json()
          cardType = tcgData.types?.[0] || null
        }

        const res = pwRes.status === 'fulfilled' ? pwRes.value : null
        if (!res) throw new Error('Network error')

        if (res.status === 401) {
          modalContent.innerHTML = `<div class="modal-state" style="color:#f05080">API key rejected — check PW_API_KEY in index.html.</div>`
          return
        }
        if (res.status === 429) {
          modalContent.innerHTML = `<div class="modal-state" style="color:#f05080">Rate limit reached — try again shortly.</div>`
          return
        }
        if (!res.ok) throw new Error(`HTTP ${res.status}`)

        const data = await res.json()
        const results = data.results || []

        const cardNumber = card.id?.split('-').pop()
        const setCode = card.setId?.toUpperCase()

        let match = results.find(r =>
          r.card_info?.set_code?.toUpperCase() === setCode &&
          String(r.card_info?.card_number) === String(cardNumber)
        )
        if (!match) match = results.find(r => r.card_info?.set_code?.toUpperCase() === setCode)
        if (!match) match = results[0]

        if (!match) {
          modalContent.innerHTML = `<div class="modal-state">No pricing data found for "${card.name}".</div>`
          return
        }

        renderCardDetails(card, match, cardType)
      } catch (err) {
        modalContent.innerHTML = `<div class="modal-state" style="color:#f05080">Failed to load: ${err.message}</div>`
      }
    }

    async function openModal(card) {
      pendingCard = card
      modalOverlay.classList.add('open')
      await loadCardData(card)
    }

    document.getElementById('main').addEventListener('click', e => {
      const el = e.target.closest('[data-card-idx]')
      if (!el) return
      const idx = parseInt(el.dataset.cardIdx, 10)
      const card = allCards.find(c => c._index === idx)
      if (!card) return
      const instances = allCards.filter(c => c.id === card.id)
      openModal({ ...card, _count: instances.length, _instances: instances })
    })

    // ── Fetch collection ────────────────────────────────────────────────────

    fetchCollection()
  </script>
</body>
