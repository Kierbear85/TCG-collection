<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nug.monster — card collection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #1e1e2e;
      --accent: #c8f050;
      --accent2: #50f0c8;
      --text: #e8e8f0;
      --muted: #5a5a7a;
      --card-glow: rgba(200, 240, 80, 0.08);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -webkit-text-size-adjust: 100%;
      -webkit-overflow-scrolling: touch;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.4;
    }

    header {
      padding: 3rem 2rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      position: relative;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 120px;
      height: 1px;
      background: var(--accent);
    }

    .site-label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
    }

    h1 {
      font-family: 'Unbounded', sans-serif;
      font-weight: 900;
      font-size: clamp(2rem, 6vw, 4.5rem);
      line-height: 0.95;
      letter-spacing: -0.02em;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-top: 0.5rem;
    }

    .controls {
      padding: 1.25rem 2rem;
      display: flex;
      gap: 1.5rem;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: rgba(10, 10, 15, 0.92);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .count-badge {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .count-badge strong {
      color: var(--accent);
      font-weight: 400;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      min-width: auto;
    }

    .control-label {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .pill-group {
      display: flex;
      gap: 0.25rem;
    }

    .pill {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.3rem 0.65rem;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .pill:hover {
      border-color: var(--muted);
      color: var(--text);
    }

    .pill.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    .set-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.05em;
      padding: 0.3rem 0.65rem;
      cursor: pointer;
      outline: none;
      max-width: 200px;
      transition: border-color 0.15s;
    }

    .set-select:focus,
    .set-select:hover {
      border-color: var(--accent);
    }

    .set-select option {
      background: var(--surface);
    }

    .legend {
      display: flex;
      gap: 1.25rem;
      align-items: center;
      flex-wrap: wrap;
      padding: 0.75rem 2rem;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .legend-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    main {
      padding: 0 0 4rem;
    }

    .set-group {
      border-bottom: 1px solid var(--border);
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.4s ease forwards;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .set-header {
      padding: 1.5rem 2rem 1rem;
      display: flex;
      align-items: baseline;
      gap: 1rem;
      cursor: pointer;
      user-select: none;
    }

    .set-header:hover .set-name {
      color: var(--accent);
    }

    .set-name {
      font-family: 'Unbounded', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      transition: color 0.15s;
    }

    .set-count {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .set-toggle {
      margin-left: auto;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      transition: color 0.15s;
    }

    .set-header:hover .set-toggle {
      color: var(--accent);
    }

    .set-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1rem;
      padding: 0 1.25rem 1.5rem;
      overflow: hidden;
      transition: max-height 0.35s ease, opacity 0.25s ease, padding 0.25s ease;
    }

    .set-cards.collapsed {
      max-height: 0 !important;
      opacity: 0;
      padding-bottom: 0;
    }

    .card {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeUp 0.3s ease forwards;
    }

    .card-img-wrap {
      position: relative;
      border-radius: 6px;
      overflow: hidden;
      background: var(--surface);
      aspect-ratio: 2.5 / 3.5;
      border: 1px solid var(--border);
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }

    .card:hover .card-img-wrap {
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--card-glow), 0 8px 24px rgba(0, 0, 0, 0.5);
      transform: translateY(-3px) rotate(-0.4deg);
    }

    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .no-image {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.55rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .status-dot {
      position: absolute;
      top: 7px;
      right: 7px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      border: 1px solid rgba(0, 0, 0, 0.5);
    }

    .status-dot.owned {
      background: var(--accent);
    }

    .status-dot.for-trade {
      background: var(--accent2);
    }

    .status-dot.wanted {
      background: #f05080;
    }

    .status-dot.sold {
      background: var(--muted);
    }

    .card-meta {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .card-name {
      font-family: 'Unbounded', sans-serif;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-number {
      font-size: 0.55rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    .card-price {
      font-size: 0.6rem;
      color: var(--accent2);
      letter-spacing: 0.05em;
    }

    .card-price-hover {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.95), rgba(0, 0, 0, 0.7));
      padding: 0.75rem 0.5rem 0.5rem;
      text-align: center;
      font-size: 0.65rem;
      color: var(--accent2);
      letter-spacing: 0.05em;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .card:hover .card-price-hover {
      opacity: 1;
    }

    .card[data-count="1"] .card-img-wrap {
      box-shadow: 0 0 20px var(--card-glow), 0 8px 24px rgba(0, 0, 0, 0.5);
    }

    .card[data-count="2"] .card-img-wrap {
      box-shadow: 0 0 20px var(--card-glow), 0 8px 24px rgba(0, 0, 0, 0.5),
        2px 10px 28px rgba(0, 0, 0, 0.35);
    }

    .card[data-count="3"] .card-img-wrap {
      box-shadow: 0 0 20px var(--card-glow), 0 8px 24px rgba(0, 0, 0, 0.5),
        2px 10px 28px rgba(0, 0, 0, 0.35),
        4px 12px 32px rgba(0, 0, 0, 0.2);
    }

    .card[data-count="4"] .card-img-wrap {
      box-shadow: 0 0 20px var(--card-glow), 0 8px 24px rgba(0, 0, 0, 0.5),
        2px 10px 28px rgba(0, 0, 0, 0.35),
        4px 12px 32px rgba(0, 0, 0, 0.2),
        6px 14px 36px rgba(0, 0, 0, 0.1);
    }

    .card[data-count="5"] .card-img-wrap {
      box-shadow: 0 0 20px var(--card-glow), 0 8px 24px rgba(0, 0, 0, 0.5),
        2px 10px 28px rgba(0, 0, 0, 0.35),
        4px 12px 32px rgba(0, 0, 0, 0.2),
        6px 14px 36px rgba(0, 0, 0, 0.1),
        8px 16px 40px rgba(0, 0, 0, 0.05);
    }

    .card-count-badge {
      position: absolute;
      top: 4px;
      left: 4px;
      background: rgba(0, 0, 0, 0.7);
      color: var(--accent);
      font-size: 0.5rem;
      padding: 0.2rem 0.4rem;
      border-radius: 3px;
      font-weight: 700;
      letter-spacing: 0.05em;
      pointer-events: none;
      border: 1px solid var(--accent);
    }

    .card-tags {
      display: flex;
      gap: 0.25rem;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 0.52rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 0.12rem 0.35rem;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .tag.owned {
      border-color: var(--accent);
      color: var(--accent);
    }

    .tag.for-trade {
      border-color: var(--accent2);
      color: var(--accent2);
    }

    .tag.wanted {
      border-color: #f05080;
      color: #f05080;
    }

    .state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6rem 2rem;
      gap: 1rem;
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-align: center;
    }

    .spinner {
      width: 22px;
      height: 22px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    footer {
      padding: 2rem;
      border-top: 1px solid var(--border);
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    @media (max-width: 768px) {
      .controls {
        padding: 0.75rem 1rem;
      }

      .set-header {
        padding: 1rem 1rem 0.75rem;
      }

      .set-cards {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 0.85rem;
        padding: 0 1rem 1.25rem;
      }

      .legend {
        padding: 0.5rem 1rem;
        gap: 0.75rem;
        font-size: 0.55rem;
      }

      .pill {
        padding: 0.25rem 0.5rem;
        font-size: 0.58rem;
      }

      .set-select {
        padding: 0.25rem 0.5rem;
        font-size: 0.58rem;
      }
    }

    @media (max-width: 520px) {
      h1 {
        font-size: 1.75rem;
      }

      .controls {
        padding: 0.75rem 1rem;
        gap: 0.5rem;
      }

      .control-label {
        font-size: 0.55rem;
      }

      .pill-group {
        gap: 0.15rem;
      }

      .pill {
        padding: 0.2rem 0.4rem;
        font-size: 0.55rem;
      }

      .set-select {
        padding: 0.2rem 0.4rem;
        font-size: 0.55rem;
        max-width: 150px;
      }

      .set-header {
        padding: 1rem 1rem 0.75rem;
      }

      .set-cards {
        grid-template-columns: repeat(2, 1fr);
        gap: 0.75rem;
        padding: 0 0.75rem 1rem;
      }

      .legend {
        padding: 0.5rem 1rem;
        gap: 0.5rem;
        font-size: 0.5rem;
      }

      .legend-dot {
        width: 5px;
        height: 5px;
      }

      footer {
        padding: 1.5rem 1rem;
        font-size: 0.55rem;
      }

      .card-name {
        font-size: 0.55rem;
      }
    }

    @media (max-width: 380px) {
      h1 {
        font-size: 1.5rem;
      }

      header {
        padding: 1.5rem 1rem 1rem;
      }

      .controls {
        padding: 0.5rem 0.75rem;
        gap: 0.4rem;
      }

      .set-cards {
        grid-template-columns: repeat(2, 1fr);
        gap: 0.6rem;
        padding: 0 0.5rem 0.85rem;
      }

      .pill {
        padding: 0.15rem 0.3rem;
        font-size: 0.5rem;
      }
    }
  </style>
</head>

<body>

  <header>
    <span class="site-label">nug.monster / collection</span>
    <h1>card<br><span>archive</span></h1>
    <p class="subtitle">pokémon tcg · stored on at protocol · fetched live</p>
  </header>

  <div class="controls">
    <span class="count-badge" id="count-badge">fetching...</span>

    <div class="control-group">
      <span class="control-label">set</span>
      <select class="set-select" id="set-filter">
        <option value="all">all sets</option>
      </select>
    </div>

    <div class="control-group">
      <span class="control-label">sort</span>
      <div class="pill-group">
        <button class="pill active" data-sort="newest">newest</button>
        <button class="pill" data-sort="az">a–z</button>
        <button class="pill" data-sort="set">set #</button>
      </div>
    </div>
  </div>

  <div class="legend">
    <span class="legend-item"><span class="legend-dot" style="background:#c8f050"></span>owned</span>
    <span class="legend-item"><span class="legend-dot" style="background:#50f0c8"></span>for trade</span>
    <span class="legend-item"><span class="legend-dot" style="background:#f05080"></span>wanted</span>
    <span class="legend-item"><span class="legend-dot" style="background:#5a5a7a"></span>sold</span>
  </div>

  <main id="main">
    <div class="state">
      <div class="spinner"></div>
      <span>fetching collection from at protocol...</span>
    </div>
  </main>

  <footer>
    <span>nug.monster · <a href="https://bsky.app/profile/nug.monster" target="_blank">@nug.monster on
        bluesky</a></span>
    <span>data via <a href="https://tcgdex.dev" target="_blank">tcgdex</a> · stored on <a href="https://atproto.com"
        target="_blank">at protocol</a></span>
  </footer>

  <script>
    const HANDLE = 'nug.monster'
    const COLLECTION = 'com.kieran.tcg.cardInstance'
    const API_BASE = `https://bsky.social/xrpc/com.atproto.repo.listRecords?repo=${HANDLE}&collection=${COLLECTION}&limit=100`
    const priceCache = new Map()
    const pendingFetches = new Map()
    const MAX_CONCURRENT = 5

    let activeFetches = 0
    const fetchQueue = []
    let allCards = []
    let currentSort = 'newest'
    let currentSetFilter = 'all'
    let collapsedSets = new Set()

    async function fetchCardDetails(cardId) {
      if (!cardId) return null

      // already cached
      if (priceCache.has(cardId)) {
        return priceCache.get(cardId)
      }

      // already being fetched
      if (pendingFetches.has(cardId)) {
        return pendingFetches.get(cardId)
      }

      const promise = new Promise((resolve) => {
        fetchQueue.push({ cardId, resolve })
        processQueue()
      })

      pendingFetches.set(cardId, promise)
      return promise
    }

    async function processQueue() {
      if (activeFetches >= MAX_CONCURRENT || fetchQueue.length === 0) return

      const { cardId, resolve } = fetchQueue.shift()
      activeFetches++

      try {
        const res = await fetch(`https://api.tcgdex.net/v2/en/cards/${cardId}`)
        const data = await res.json()

        priceCache.set(cardId, data)
        resolve(data)

      } catch (err) {
        resolve(null)
      } finally {
        pendingFetches.delete(cardId)
        activeFetches--
        processQueue()
      }
    }

    async function fetchCollection() {
      try {
        let cursor = null
        let records = []

        do {
          const url = cursor ? `${API_BASE}&cursor=${cursor}` : API_BASE
          const res = await fetch(url)
          if (!res.ok) throw new Error(`HTTP ${res.status}`)
          const data = await res.json()
          records = records.concat(data.records)
          cursor = data.cursor
        } while (cursor)

        allCards = records.map((r, i) => ({ ...r.value, _index: i }))

        if (!allCards.length) {
          document.getElementById('main').innerHTML = `<div class="state"><span>no cards in collection yet</span></div>`
          document.getElementById('count-badge').textContent = 'empty collection'
          return
        }

        populateSetFilter()
        render()

        // Dedupe cards before hydrating prices
        const deduped = dedupeCards(allCards)
        hydratePrices(deduped)

      } catch (err) {
        document.getElementById('main').innerHTML = `
        <div class="state" style="color:#f05080">
          <span>failed to load collection</span>
          <span style="color:var(--muted);font-size:0.65rem">${err.message}</span>
        </div>`
      }
    }

    function populateSetFilter() {
      const sets = [...new Set(allCards.map(c => c.set).filter(Boolean))].sort()
      const sel = document.getElementById('set-filter')
      sets.forEach(s => {
        const opt = document.createElement('option')
        opt.value = s
        opt.textContent = s
        sel.appendChild(opt)
      })
    }

    function sortByLocalId(a, b) {
      // Extract local ID from card ID (format: "setId-localId")
      const getNum = (card) => {
        const id = card.id || card.cardId || ''
        const parts = id.split('-')
        return parseInt(parts[parts.length - 1], 10)
      }

      const na = getNum(a)
      const nb = getNum(b)

      if (!isNaN(na) && !isNaN(nb)) return na - nb
      return (a.id || a.cardId || '').localeCompare(b.id || b.cardId || '')
    }

    function dedupeCards(cards) {
      const map = new Map()
      cards.forEach(card => {
        const key = card.id || card.cardId || card._index
        if (!map.has(key)) {
          map.set(key, { ...card, count: 0 })
        }
        map.get(key).count++
      })
      return [...map.values()]
    }

    function getSorted(cards) {
      // Dedupe cards first
      const deduped = dedupeCards(cards)

      if (currentSort === 'az') {
        return deduped.sort((a, b) => a.name.localeCompare(b.name))
      }

      if (currentSort === 'set') {
        return deduped.sort(sortByLocalId)
      }

      return deduped.sort((a, b) => b._index - a._index)
    }

    function groupBySet(cards) {
      const map = new Map()
      cards.forEach(card => {
        const key = card.set || 'Unknown Set'
        if (!map.has(key)) map.set(key, [])
        map.get(key).push(card)
      })

      let entries = [...map.entries()]

      if (currentSort === 'az') {
        entries.sort(([a], [b]) => a.localeCompare(b))
      } else {
        entries.sort(([, a], [, b]) => {
          return Math.max(...b.map(c => c._index)) - Math.max(...a.map(c => c._index))
        })
      }

      return entries
    }

    function formatCollectorNumber(card) {
      if (!card.localId || !card.set?.cardCount?.official) return ''

      const num = card.localId.padStart(3, '0')
      const total = card.set.cardCount.official
      return `${num}/${total}`
    }

    function extractPrice(card) {
      const prices = card?.pricing?.cardmarket
      if (!prices) return null

      // Use trend price (recent market price) in EUR, convert to USD approx
      const eurPrice = prices.trend || prices.avg || prices.avg30
      if (!eurPrice) return null

      // Convert EUR to USD (approximate)
      return eurPrice * 1.1
    }

    function formatPrice(card) {
      const price = extractPrice(card)
      return price ? `$${price.toFixed(2)}` : ''
    }

    function render() {
      const filtered = currentSetFilter === 'all'
        ? allCards
        : allCards.filter(c => c.set === currentSetFilter)

      const sorted = getSorted(filtered)
      const uniqueCount = sorted.length

      const badge = document.getElementById('count-badge')
      badge.innerHTML = `<strong>${uniqueCount}</strong> card${uniqueCount !== 1 ? 's' : ''}${currentSetFilter !== 'all' ? ` · <strong>${currentSetFilter}</strong>` : ''}`

      if (!sorted.length) {
        document.getElementById('main').innerHTML = `<div class="state"><span>no cards match current filter</span></div>`
        return
      }

      const groups = groupBySet(sorted)
      const main = document.getElementById('main')
      main.innerHTML = ''

      groups.forEach(([setName, cards], gi) => {
        const isCollapsed = collapsedSets.has(setName)

        const group = document.createElement('div')
        group.className = 'set-group'
        group.style.animationDelay = `${gi * 50}ms`

        const approxHeight = Math.ceil(cards.length / 5) * 280 + 80

        group.innerHTML = `
        <div class="set-header">
          <span class="set-name">${setName}</span>
          <span class="set-count">${cards.length} card${cards.length !== 1 ? 's' : ''}</span>
          <span class="set-toggle">${isCollapsed ? '▸ expand' : '▾ collapse'}</span>
        </div>
        <div class="set-cards ${isCollapsed ? 'collapsed' : ''}" style="max-height:${isCollapsed ? '0' : approxHeight + 'px'}">
          ${cards.map((card, i) => cardHTML(card, i)).join('')}
        </div>
      `

        group.querySelector('.set-header').addEventListener('click', () => {
          const cardsEl = group.querySelector('.set-cards')
          const toggle = group.querySelector('.set-toggle')
          if (collapsedSets.has(setName)) {
            collapsedSets.delete(setName)
            cardsEl.classList.remove('collapsed')
            cardsEl.style.maxHeight = approxHeight + 'px'
            toggle.textContent = '▾ collapse'
          } else {
            collapsedSets.add(setName)
            cardsEl.classList.add('collapsed')
            cardsEl.style.maxHeight = '0'
            toggle.textContent = '▸ expand'
          }
        })

        main.appendChild(group)
      })
    }

    function hydratePrices(cards) {
      cards.forEach(async (card) => {
        const cardId = card.id || card.cardId || card._index
        const el = document.getElementById(`price-${cardId}`)
        if (!el) return

        // if no card ID, stop here
        const tcgdexId = card.id || card.cardId
        if (!tcgdexId) return

        // try to fetch price data
        const full = await fetchCardDetails(tcgdexId)
        if (!full) return

        // show collector number from TCGDEX data
        const collector = formatCollectorNumber(full)
        if (collector) {
          el.textContent = collector
        }

        const price = extractPrice(full)
        if (price) {
          el.textContent = collector ? `${collector} · $${price.toFixed(2)}` : `$${price.toFixed(2)}`
        }
      })
    }

    function cardHTML(card, i) {
      const status = card.status || 'owned'
      const condition = card.condition || ''
      const delay = Math.min(i * 25, 500)
      const hasImg = !!card.image
      const count = card.count || 1

      const collector = formatCollectorNumber(card)

      return `
    <div class="card" data-count="${count}" style="animation-delay:${delay}ms">
      <div class="card-img-wrap">
        ${hasImg ? `<img src="${card.image}" alt="${card.name}" loading="lazy" onerror="this.style.display='none';this.parentElement.querySelector('.no-image').style.display='flex'">` : ''}
        <div class="no-image" style="display:${hasImg ? 'none' : 'flex'}">no image</div>
        <div class="status-dot ${status}"></div>
        ${count > 1 ? `<div class="card-count-badge">×${count}</div>` : ''}
        <div class="card-price-hover" id="price-${card.id || card.cardId || card._index}"></div>
      </div>
      <div class="card-meta">
        <div class="card-name" title="${card.name}">${card.name}</div>
        <div class="card-tags">
          <span class="tag ${status}">${status}</span>
          ${condition ? `<span class="tag">${condition}</span>` : ''}
        </div>
      </div>
    </div>
  `
    }

    document.getElementById('set-filter').addEventListener('change', e => {
      currentSetFilter = e.target.value
      render()

      // Dedupe and hydrate prices for the filtered set
      const filtered = currentSetFilter === 'all' ? allCards : allCards.filter(c => c.set === currentSetFilter)
      const deduped = dedupeCards(filtered)
      hydratePrices(deduped)
    })

    document.querySelectorAll('.pill[data-sort]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.pill[data-sort]').forEach(b => b.classList.remove('active'))
        btn.classList.add('active')
        currentSort = btn.dataset.sort
        const filtered = currentSetFilter === 'all' ? allCards : allCards.filter(c => c.set === currentSetFilter)
        render()

        // Dedupe cards before hydrating prices
        const deduped = dedupeCards(filtered)
        hydratePrices(deduped)
      })
    })

    fetchCollection()
  </script>
</body>

</html>
