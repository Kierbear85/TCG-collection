<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nug.monster — card collection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: #1e1e2e;
      --accent: #c8f050;
      --accent2: #50f0c8;
      --text: #e8e8f0;
      --muted: #5a5a7a;
      --card-glow: rgba(200, 240, 80, 0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.4;
    }

    header {
      padding: 3rem 2rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      position: relative;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 120px;
      height: 1px;
      background: var(--accent);
    }

    .site-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
    }

    h1 {
      font-family: 'Unbounded', sans-serif;
      font-weight: 900;
      font-size: clamp(2rem, 6vw, 4.5rem);
      line-height: 0.95;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-top: 0.5rem;
    }

    /* filters bar */
    .controls {
      padding: 1.5rem 2rem;
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }

    .count-badge {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .count-badge strong {
      color: var(--accent);
      font-weight: 400;
    }

    .filter-group {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-left: auto;
    }

    .filter-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.35rem 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover, .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 1.5rem;
      padding: 2rem;
    }

    /* card */
    .card {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.4s ease forwards;
      cursor: pointer;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .card-img-wrap {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      background: var(--surface);
      aspect-ratio: 2.5 / 3.5;
      border: 1px solid var(--border);
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }

    .card:hover .card-img-wrap {
      border-color: var(--accent);
      box-shadow: 0 0 24px var(--card-glow), 0 8px 32px rgba(0,0,0,0.5);
      transform: translateY(-4px) rotate(-0.5deg);
    }

    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s;
    }

    .card:hover .card-img-wrap img {
      transform: scale(1.03);
    }

    .no-image {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .status-dot {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.4);
    }

    .status-dot.owned     { background: var(--accent); }
    .status-dot.for-trade { background: var(--accent2); }
    .status-dot.wanted    { background: #f05080; }
    .status-dot.sold      { background: var(--muted); }

    .card-meta {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .card-name {
      font-family: 'Unbounded', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-set {
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-tags {
      display: flex;
      gap: 0.3rem;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 0.55rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.15rem 0.4rem;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .tag.owned     { border-color: var(--accent); color: var(--accent); }
    .tag.for-trade { border-color: var(--accent2); color: var(--accent2); }
    .tag.wanted    { border-color: #f05080; color: #f05080; }

    /* loading / empty states */
    .state {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6rem 2rem;
      gap: 1rem;
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-align: center;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      color: #f05080;
    }

    footer {
      padding: 2rem;
      border-top: 1px solid var(--border);
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    /* status legend */
    .legend {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
      padding: 0 2rem 1.5rem;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .legend-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    @media (max-width: 480px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; padding: 1rem; }
      h1 { font-size: 2rem; }
      .controls { padding: 1rem; }
      .filter-group { margin-left: 0; }
    }
  </style>
</head>
<body>

<header>
  <span class="site-label">nug.monster / collection</span>
  <h1>card<br><span>archive</span></h1>
  <p class="subtitle">pokémon tcg · stored on at protocol · fetched live</p>
</header>

<div class="legend">
  <span class="legend-item"><span class="legend-dot" style="background:#c8f050"></span>owned</span>
  <span class="legend-item"><span class="legend-dot" style="background:#50f0c8"></span>for trade</span>
  <span class="legend-item"><span class="legend-dot" style="background:#f05080"></span>wanted</span>
  <span class="legend-item"><span class="legend-dot" style="background:#5a5a7a"></span>sold</span>
</div>

<div class="controls">
  <span class="count-badge">loading<strong id="count"></strong></span>
  <div class="filter-group" id="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="owned">Owned</button>
    <button class="filter-btn" data-filter="for-trade">For Trade</button>
    <button class="filter-btn" data-filter="wanted">Wanted</button>
  </div>
</div>

<div class="grid" id="grid">
  <div class="state">
    <div class="spinner"></div>
    <span>fetching collection from AT protocol...</span>
  </div>
</div>

<footer>
  <span>nug.monster · <a href="https://bsky.app/profile/nug.monster" target="_blank">@nug.monster on bluesky</a></span>
  <span>data via <a href="https://tcgdex.dev" target="_blank">tcgdex</a> · stored on <a href="https://atproto.com" target="_blank">at protocol</a></span>
</footer>

<script>
  const HANDLE = 'nug.monster'
  const COLLECTION = 'com.kieran.tcg.cardInstance'
  const API = `https://bsky.social/xrpc/com.atproto.repo.listRecords?repo=${HANDLE}&collection=${COLLECTION}&limit=100`

  let allCards = []
  let currentFilter = 'all'

  async function fetchCollection() {
    const grid = document.getElementById('grid')
    const countEl = document.getElementById('count')

    try {
      let cursor = null
      let records = []

      // paginate through all records
      do {
        const url = cursor ? `${API}&cursor=${cursor}` : API
        const res = await fetch(url)
        if (!res.ok) throw new Error(`HTTP ${res.status}`)
        const data = await res.json()
        records = records.concat(data.records)
        cursor = data.cursor
      } while (cursor)

      allCards = records.map(r => r.value)

      if (!allCards.length) {
        grid.innerHTML = `<div class="state"><span>no cards in collection yet</span></div>`
        countEl.textContent = ''
        document.querySelector('.count-badge').innerHTML = 'collection is empty'
        return
      }

      countEl.textContent = ` — ${allCards.length} card${allCards.length !== 1 ? 's' : ''}`
      document.querySelector('.count-badge').innerHTML = `<strong>${allCards.length}</strong> card${allCards.length !== 1 ? 's' : ''}`

      renderCards(allCards)

    } catch (err) {
      grid.innerHTML = `<div class="state error-msg"><span>failed to load collection</span><span style="color:var(--muted);font-size:0.65rem">${err.message}</span></div>`
    }
  }

  function renderCards(cards) {
    const grid = document.getElementById('grid')

    const filtered = currentFilter === 'all'
      ? cards
      : cards.filter(c => c.status === currentFilter)

    if (!filtered.length) {
      grid.innerHTML = `<div class="state"><span>no cards with status "${currentFilter}"</span></div>`
      return
    }

    grid.innerHTML = filtered.map((card, i) => {
      const status = card.status || 'owned'
      const condition = card.condition || ''
      const delay = Math.min(i * 40, 800)

      const imgHtml = card.image
        ? `<img src="${card.image}" alt="${card.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : ''

      return `
        <div class="card" style="animation-delay:${delay}ms">
          <div class="card-img-wrap">
            ${imgHtml}
            <div class="no-image" style="display:${card.image ? 'none' : 'flex'}">no image</div>
            <div class="status-dot ${status}"></div>
          </div>
          <div class="card-meta">
            <div class="card-name" title="${card.name}">${card.name}</div>
            <div class="card-set" title="${card.set || ''}">${card.set || '—'}</div>
            <div class="card-tags">
              <span class="tag ${status}">${status}</span>
              ${condition ? `<span class="tag">${condition}</span>` : ''}
            </div>
          </div>
        </div>
      `
    }).join('')
  }

  // filters
  document.getElementById('filters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn')
    if (!btn) return

    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')
    currentFilter = btn.dataset.filter
    renderCards(allCards)
  })

  fetchCollection()
</script>

</body>
</html>
